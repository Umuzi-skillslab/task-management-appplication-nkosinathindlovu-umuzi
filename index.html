<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Task Management System</h1>

        <form class="add-task-section">
            <h2>Add New Task</h2>
            <input type="text" id="title" placeholder="Task title" required>
            <input type="text" id="description" placeholder="Description">
            <select id="priority">
                <option value="1">Low priority</option>
                <option value="2">Medium priority</option>
                <option value="3">High priority</option>
            </select>
            <button type="submit" class="add-task-btn">Add Task</button>
        </form>

        <div class="statistics">
            <!--Will be Filled in dynamically by dom.js -->
        </div>

        <div class="task-list" id="task-list">
            <!-- The Tasks are rendered here by dom.js -->
        </div>
    </div>

    <!-- dom.js is an ES module and imports app.js/utils.js itself,
         so this is the only script tag the page needs. -->
    <script type="module" src="src/dom.js"></script>
</body>
</html>
